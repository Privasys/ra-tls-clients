#
# Build the Rust RA-TLS mobile FFI library for iOS and Android.
#
# This workflow compiles the rustls fork to static/shared libraries
# that the Expo native modules link against. Artifacts are uploaded
# for the wallet build workflow to consume.
#
# Can also be triggered manually to get fresh binaries.

name: Build Rust FFI Libraries

on:
  push:
    branches: [main]
    paths:
      - 'rust/mobile/**'
      - '.github/workflows/build-mobile-ffi.yaml'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'release'
        type: choice
        options: [release, debug]

jobs:
  build-ios:
    runs-on: macos-14  # Apple Silicon, macOS Sonoma, Xcode 15+
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/mobile/target
          key: rust-ios-${{ hashFiles('rust/mobile/Cargo.lock') }}
          restore-keys: rust-ios-

      - name: Build
        working-directory: rust/mobile
        run: |
          chmod +x scripts/build-ios.sh
          ./scripts/build-ios.sh ${{ inputs.profile || 'release' }}

      - name: List outputs
        run: find rust/mobile/target/ios -type f | head -20

      - uses: actions/upload-artifact@v4
        with:
          name: ratls-mobile-ios
          path: rust/mobile/target/ios/
          retention-days: 30

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
        id: ndk

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/mobile/target
          key: rust-android-${{ hashFiles('rust/mobile/Cargo.lock', 'rust/mobile/scripts/build-android.sh') }}
          restore-keys: rust-android-

      - name: Build
        working-directory: rust/mobile
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          chmod +x scripts/build-android.sh
          ./scripts/build-android.sh ${{ inputs.profile || 'release' }}

      - name: List outputs
        run: find rust/mobile/target/android -type f | head -20

      - uses: actions/upload-artifact@v4
        with:
          name: ratls-mobile-android
          path: rust/mobile/target/android/jniLibs/
          retention-days: 30

  # Publish iOS + Android artefacts to a GitHub Release when a v* tag
  # is pushed, so downstream builds (e.g. the wallet) can download the
  # pre-built binaries instead of recompiling Rust on every build.
  #
  # Tarball layout (consumer-friendly: extract directly into the
  # corresponding wallet/modules/native-ratls/<platform>/ subdirectory):
  #
  #   ratls-mobile-ios.tar.gz       → libratls_mobile.a
  #     extract into wallet/modules/native-ratls/ios/lib/
  #
  #   ratls-mobile-android.tar.gz   → arm64-v8a/libratls_mobile.so
  #                                   x86_64/libratls_mobile.so
  #     extract into wallet/modules/native-ratls/android/src/main/jniLibs/
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-ios, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ratls-mobile-ios
          path: dist/ios
      - uses: actions/download-artifact@v4
        with:
          name: ratls-mobile-android
          path: dist/android

      - name: Stage iOS payload (extract device .a from xcframework)
        run: |
          set -euo pipefail
          mkdir -p stage/ios
          # The build-ios.sh script produces RaTlsMobile.xcframework when
          # both device + simulator builds succeed, otherwise a flat .a.
          if [ -d dist/ios/RaTlsMobile.xcframework ]; then
            DEVICE_LIB=$(find dist/ios/RaTlsMobile.xcframework -path '*ios-arm64/libratls_mobile.a' \
              -not -path '*simulator*' | head -1)
            if [ -z "$DEVICE_LIB" ]; then
              echo "ERROR: could not locate device static lib inside xcframework"
              find dist/ios/RaTlsMobile.xcframework
              exit 1
            fi
            cp "$DEVICE_LIB" stage/ios/libratls_mobile.a
          elif [ -f dist/ios/libratls_mobile.a ]; then
            cp dist/ios/libratls_mobile.a stage/ios/libratls_mobile.a
          else
            echo "ERROR: no iOS static library found in dist/ios"
            find dist/ios
            exit 1
          fi
          ls -la stage/ios

      - name: Stage Android payload + verify 16 KB alignment
        run: |
          set -euo pipefail
          mkdir -p stage/android
          # dist/android already has arm64-v8a/ and x86_64/ subfolders
          cp -R dist/android/. stage/android/
          ls -la stage/android
          # Sanity-check 16 KB page-size alignment so we never publish a
          # release that Google Play will reject.
          sudo apt-get install -y --no-install-recommends binutils >/dev/null
          for so in stage/android/arm64-v8a/libratls_mobile.so stage/android/x86_64/libratls_mobile.so; do
            ALIGN=$(readelf -lW "$so" | awk '/LOAD/ { print $NF; exit }')
            ALIGN_DEC=$((ALIGN))
            if [ "$ALIGN_DEC" -lt 16384 ]; then
              echo "ERROR: $so is not 16 KB aligned (LOAD align = $ALIGN)"
              exit 1
            fi
            echo "  $so: 16 KB alignment OK ($ALIGN)"
          done

      - name: Package release tarballs
        run: |
          set -euo pipefail
          mkdir -p release
          tar -C stage/ios -czf release/ratls-mobile-ios.tar.gz .
          tar -C stage/android -czf release/ratls-mobile-android.tar.gz .
          (cd release && sha256sum ratls-mobile-ios.tar.gz ratls-mobile-android.tar.gz > SHA256SUMS)
          ls -la release
          echo "--- iOS tarball contents ---"
          tar -tzf release/ratls-mobile-ios.tar.gz
          echo "--- Android tarball contents ---"
          tar -tzf release/ratls-mobile-android.tar.gz

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/ratls-mobile-ios.tar.gz
            release/ratls-mobile-android.tar.gz
            release/SHA256SUMS
          fail_on_unmatched_files: true
          generate_release_notes: true
